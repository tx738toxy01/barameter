<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barameter</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤦🏻‍♀️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0b; color: white; font-family: system-ui, -apple-system, sans-serif; }
        .glass { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .status-good { background: linear-gradient(145deg, #052e16, #14532d); border-color: #22c55e; }
        .status-warn { background: linear-gradient(145deg, #431407, #78350f); border-color: #f59e0b; }
        .status-bad { background: linear-gradient(145deg, #450a0a, #7f1d1d); border-color: #ef4444; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">

    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-4xl font-black tracking-tighter">Barameter</h1>
            <p class="text-zinc-500 text-sm">Nezúfaj, Bara ti povie, že čo!</p>
        </div>
        <button onclick="useMyLocation()" class="p-3 glass rounded-2xl text-2xl">📍</button>
    </div>

    <div class="relative mb-6">
        <div class="flex gap-2">
            <input id="cityInput" type="text" placeholder="Zadaj mesto..." 
                   autocomplete="off" autocorrect="off" spellcheck="false"
                   class="flex-1 bg-zinc-900 border border-zinc-800 rounded-2xl px-5 py-3 text-lg focus:outline-none focus:border-emerald-500">
            <button onclick="searchCity()" class="bg-emerald-600 hover:bg-emerald-500 px-6 rounded-2xl font-bold">Hľadať</button>
        </div>
        
        <!-- Autocomplete suggestions -->
        <div id="suggestions" class="hidden absolute z-50 mt-1 w-full bg-zinc-900 border border-zinc-700 rounded-2xl overflow-hidden shadow-xl"></div>
    </div>

    <!-- Main Status Card -->
    <div class="space-y-4 mb-6">
        
        <div id="statusCard" onclick="showTipsModal()" class="glass rounded-3xl p-6 border transition-all duration-300 cursor-pointer status-good">
            
            <div class="flex justify-between items-start mb-4">
                <div>
                    <div class="text-3xl md:text-4xl font-black text-white mb-1 tracking-tight">Bára, a čo teraz?</div>
                    <div class="flex items-center gap-2">
                        <div id="locationName" class="text-xs md:text-sm font-bold text-zinc-400 uppercase tracking-widest">Bratislava</div>
                        <span class="text-zinc-600">•</span>
                        <div id="currentTime" class="text-emerald-400 text-sm font-mono"></div>
                    </div>
                </div>
                <button onclick="event.stopImmediatePropagation(); openMap()" class="text-3xl opacity-70 hover:opacity-100 mt-1">🗺️</button>
            </div>

            <div class="text-center py-5">
                <div id="statusEmoji" class="text-7xl mb-4 drop-shadow-lg">⏳</div>
                <div id="statusText" class="text-4xl font-black tracking-tighter leading-tight">Načítavam...</div>
                <div id="statusDesc" class="text-zinc-300 mt-2 text-lg"></div>
            </div>

            <div class="grid grid-cols-3 gap-4 text-center text-sm bg-black/20 p-4 rounded-2xl">
                <div>
                    <div class="text-zinc-400">Teplota</div>
                    <div id="temp" class="font-bold text-xl mt-1 text-white">--°C</div>
                </div>
                <div>
                    <div class="text-zinc-400">Vietor</div>
                    <div id="wind" class="font-bold text-xl mt-1 text-white">-- km/h</div>
                </div>
                <div>
                    <div class="text-zinc-400">Zrážky</div>
                    <div id="rain" class="font-bold text-xl mt-1 text-white">--</div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div onclick="openCalendar()" class="glass rounded-3xl p-5 border border-zinc-700/50 hover:bg-zinc-800 transition-all cursor-pointer flex flex-col justify-center items-center text-center">
                <div class="text-4xl mb-3 drop-shadow-lg">📅</div>
                <div class="font-bold text-[15px] leading-tight text-white">Bára, a čo<br>ďalšie dni?</div>
            </div>

            <!-- 3. KARTA: Vtip -->
            <div onclick="tellJoke()" class="glass rounded-3xl p-5 border border-zinc-700/50 hover:bg-zinc-800 transition-all cursor-pointer flex flex-col justify-center items-center text-center">
                <div class="text-4xl mb-3 drop-shadow-lg">🎭</div>
                <div class="font-bold text-[15px] leading-tight text-white">Bára,<br>povedz vtip!</div>
            </div>
        </div>
    </div>

    <!-- Tips Modal -->
    <div id="tipsModal" onclick="hideTipsModal()" 
         class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div onclick="event.stopImmediatePropagation()" 
             class="glass rounded-3xl p-8 max-w-sm w-full mx-4 border border-zinc-700">
            
            <div class="flex justify-between items-center mb-4">
                <div class="font-bold text-xl">Detaily a tipy</div>
                <button onclick="hideTipsModal()" class="text-3xl text-zinc-400 hover:text-white">×</button>
            </div>
            
            <div id="modalTipsContent" class="text-base"></div>
            
            <button onclick="hideTipsModal()" 
                    class="mt-8 w-full py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl font-medium">
                Zavrieť
            </button>
        </div>
    </div>
<div id="calendarModal" onclick="if(event.target === this) hideCalendar()" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-md max-h-[85vh] overflow-y-auto border border-zinc-700 shadow-2xl">
            <div class="sticky top-0 bg-zinc-900/95 backdrop-blur px-6 py-4 flex justify-between items-center border-b border-zinc-700 z-10">
                <div id="calendarTitle" class="font-bold text-lg text-white">Výhľad na 16 dní</div>
                <button onclick="hideCalendar()" class="text-3xl text-zinc-400 hover:text-white">&times;</button>
            </div>
            <div id="calendarGrid" class="p-5 grid grid-cols-4 gap-3"></div>
        </div>
    </div>

    <div id="dayDetailModal" onclick="if(event.target === this) hideDayDetail()" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[60] p-4">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-sm max-h-[85vh] overflow-y-auto border border-zinc-700 shadow-2xl">
            <div class="sticky top-0 bg-zinc-900/95 backdrop-blur px-5 py-4 flex justify-between items-center border-b border-zinc-700 z-10">
                <button onclick="hideDayDetail()" class="text-zinc-400 hover:text-white text-sm font-bold flex items-center gap-1"><span>←</span> Späť</button>
                <div id="dayDetailTitle" class="font-bold text-lg text-emerald-400">Detail dňa</div>
            </div>
            <div id="dayDetailContent" class="p-5 space-y-3"></div>
        </div>
    </div>
<!-- Joke Modal -->
    <div id="jokeModal" onclick="if(event.target === this) this.classList.replace('flex','hidden')" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
        <div class="bg-zinc-900 rounded-3xl p-8 text-center max-w-sm w-full border border-zinc-700 shadow-2xl">
            <div class="text-6xl mb-4">🤣</div>
            <div id="jokeContent" class="text-lg font-medium text-emerald-400 mb-6"></div>
            <button onclick="document.getElementById('jokeModal').classList.replace('flex','hidden')" class="w-full py-3 bg-zinc-800 hover:bg-zinc-700 text-white font-bold rounded-2xl transition-all">Haha, dík!</button>
        </div>
    </div>
    <script>
        let currentLat = 48.1486;
        let currentLon = 17.1077;
        let currentCity = "Bratislava";
        let currentStatusType = "good";
        let currentOwmData = null;
        let forecast16Data = null; // Tu si appka uloží stiahnutý kalendár

        // Zoznam vtipov pre to malé tretie okienko
        const jokes = [
            "Proč má Harry Potter na čele jizvu ve tvaru blesku? Protože když byl malý, tak ho srazil Opel. Na druhou stranu může být rád, že ho nesrazil Renault...",
            "Jak se jmenuje western ze školního prostředí? Sedm nedostatečných.",
            "Tak sa vám raz šťúram špendlíkom v uchu a zrazu ticho! No a tak sa pozriem na ten špendlík zblízka a zrazu tma!",
            "Nemíváte-li ve sportech štěstí napoprvé, parašutismus není pro vás.",
            "Každý člověk má dobré srdce. - Hannibal Lecter"
        ];

// Naša vlastná offline databáza vtipov (Vylepšená filmárska edícia)
        const skVtipy = [
            "Aký je rozdiel medzi hlavným kameramanom a Bohom? Boh si nemyslí, že je hlavný kameraman.",
            "Někde psali, že jíst v Mekáči není zdravé. Proto si to nechávám zabalit a sním to až doma.",
            "Aký je rozdiel medzi predpoveďou počasia od SHMÚ a dispozíciou? Predpoveď počasia občas vyjde.",
            "Prečo po blesku prichádza hrom? Aj Boh musí čakať na zvuk.",
            "Herec: 'Je tu zima, fúka a leje, ja v tomto nehrám!' Produkčný: 'Neboj sa nič, na kamere to vyzerá ako taký jemný, drahý cinematic dáždik.'",
            "Vieš, prečo filmári na pľaci tak radi a často nadávajú na zlé počasie? Lebo na režiséra sa nahlas nadávať nesmie.",
            "Dnes mi Slovenská pošta doručila list. Mám nastúpiť na vojnu. Rakúsko-Uhorsko ma vraj potrebuje.",
            "Najkratší filmársky vtip: 'Zajtra končíme presne podľa dispo.'",
            "Prečo efektári nefajčia? Trvalo by im štyri hodiny, kým by to zapálili.",
            "Koľko rekvizitárov je potrebných na výmenu žiarovky? „No dovoľ! To je stavba!“",
            "Aký je rozdiel medzi štábom a psom? - Ľudia sa rozčuľujú, keď sa so psom zaobchádza zle."
        ];

function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371; // Polomer Zeme v km
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
}

        function updateTime() {
            const el = document.getElementById('currentTime');
            const now = new Date();
            el.innerText = now.toLocaleTimeString('sk-SK', { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateTime, 30000);
        updateTime();

        function setStatus(statusClass, emoji, text, desc, statusType) {
            const card = document.getElementById('statusCard');
            card.className = `glass rounded-3xl p-8 border mb-6 transition-all duration-300 cursor-pointer ${statusClass}`;
            
            document.getElementById('statusEmoji').innerText = emoji;
            document.getElementById('statusText').innerText = text;
            document.getElementById('statusDesc').innerText = desc;
            currentStatusType = statusType;
        }

async function showTipsModal() {
            const modal = document.getElementById('tipsModal');
            const content = document.getElementById('modalTipsContent');
            
            // Predbežný loading, kým na pozadí počítame vzdialenosť podľa tvojho nápadu
            content.innerHTML = '<div class="text-center py-8 text-zinc-400">Načítavam dáta a počítam vzdialenosť... ⏳</div>';
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            let html = '';

            // 1. INFO O METEOSTANICI
            if (currentOwmData) {
                let stName = currentOwmData.name || "Neznáma stanica";
                
                // --- TVOJ NÁPAD: Dynamické zistenie skutočnej polohy podľa názvu ---
                let distanceBadge = '';
                // Ak máme názov a nie je to úplne to isté miesto, aké sme hľadali
                if (stName !== "Neznáma stanica" && stName !== currentCity) {
                    try {
                        // Bleskovo zistíme skutočné súradnice vráteného miesta (napr. Liptovský Hrádok)
                        const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(stName)}&count=1`);
                        const geoData = await geoRes.json();
                        
                        if (geoData.results && geoData.results[0]) {
                            let realLat = geoData.results[0].latitude;
                            let realLon = geoData.results[0].longitude;
                            
                            // Vypočítame SKUTOČNÚ vzdialenosť
                            let distanceKm = calculateDistance(currentLat, currentLon, realLat, realLon).toFixed(1);
                            
                            if (distanceKm > 0.1) {
                                distanceBadge = `<div class="text-xs text-emerald-500 font-medium bg-emerald-500/10 px-2 py-0.5 rounded-full">~ ${distanceKm} km ďaleko</div>`;
                            }
                        }
                    } catch (e) {
                        console.log("Nepodarilo sa načítať reálnu polohu stanice");
                    }
                }
                // ----------------------------------------------------------------------

                let wTemp = Math.round(currentOwmData.main.temp);
                let wFeels = Math.round(currentOwmData.main.feels_like);
                let wSpd = Math.round(currentOwmData.wind.speed * 3.6);
                let wHum = currentOwmData.main.humidity;
                let wPress = currentOwmData.main.pressure;
                let wDesc = currentOwmData.weather[0] ? currentOwmData.weather[0].description : "";
                if (wDesc) wDesc = wDesc.charAt(0).toUpperCase() + wDesc.slice(1);
                
                // Určenie správnej ikonky
                let owmCode = currentOwmData.weather[0] ? currentOwmData.weather[0].id : 800;
                let owmIconStr = currentOwmData.weather[0] ? currentOwmData.weather[0].icon : '01d';
                let isNightOWM = owmIconStr.includes('n');
                let owmIcon = '❓';
                if (owmCode >= 200 && owmCode < 300) owmIcon = '⛈️';
                else if (owmCode >= 300 && owmCode < 600) owmIcon = '🌧️';
                else if (owmCode >= 600 && owmCode < 700) owmIcon = '🌨️';
                else if (owmCode >= 700 && owmCode < 800) owmIcon = '🌫️';
                else if (owmCode === 800) owmIcon = isNightOWM ? '🌙' : '☀️';
                else if (owmCode === 801 || owmCode === 802) owmIcon = isNightOWM ? '☁️' : '🌤️';
                else if (owmCode >= 803) owmIcon = '☁️';

                html += `
                    <div class="mb-5 pb-5 border-b border-zinc-700/50">
                        <div class="flex justify-between items-baseline mb-1">
                            <div class="text-xs text-zinc-500 uppercase tracking-wider">Dáta z meteostanice</div>
                            ${distanceBadge}
                        </div>
                        <div class="text-2xl font-black text-white mb-4">${stName}</div>
                        
                        <div class="flex items-center gap-4 mb-4 bg-zinc-800/50 p-3 rounded-2xl border border-zinc-700/50">
                            <div class="text-5xl drop-shadow-lg">${owmIcon}</div>
                            <div>
                                <div class="text-3xl font-black">${wTemp}°C</div>
                                <div class="text-sm text-zinc-300 font-medium">${wDesc}</div>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-y-3 text-sm px-2">
                            <div class="text-zinc-500">Pocitovo:</div> <div class="text-right font-bold">${wFeels} °C</div>
                            <div class="text-zinc-500">Vietor:</div> <div class="text-right font-bold">${wSpd} km/h</div>
                            <div class="text-zinc-500">Vlhkosť:</div> <div class="text-right font-bold">${wHum} %</div>
                            <div class="text-zinc-500">Tlak:</div> <div class="text-right font-bold">${wPress} hPa</div>
                        </div>
                    </div>
                `;
            }

            // 2. TIPY PRE FILMÁROV
            html += `<div class="font-bold text-lg mb-3 text-emerald-400">Tipy na natáčanie</div><div class="space-y-4 text-sm">`;

            if (currentStatusType === 'good') {
                html += `
                    <div class="flex gap-3"><span class="text-emerald-400 mt-0.5">→</span> <span>Využi dobré svetlo na široké zábery a detaily.</span></div>
                    <div class="flex gap-3"><span class="text-emerald-400 mt-0.5">→</span> <span>Skontroluj expozíciu – môže byť príliš jasno.</span></div>
                    <div class="flex gap-3"><span class="text-emerald-400 mt-0.5">→</span> <span>Ideálny čas na natural look bez veľkých úprav.</span></div>
                `;
            } else if (currentStatusType === 'warn') {
                html += `
                    <div class="flex gap-3"><span class="text-amber-400 mt-0.5">→</span> <span><strong>Vietor:</strong> Veterník na mikrofón + zaisti statív.</span></div>
                    <div class="flex gap-3"><span class="text-amber-400 mt-0.5">→</span> <span><strong>Prehánky/Hmla:</strong> Maj pripravené ochranné plachty na kameru.</span></div>
                    <div class="flex gap-3"><span class="text-amber-400 mt-0.5">→</span> <span>Zváž kratšie zábery a rýchlejšie presuny.</span></div>
                `;
            } else {
                html += `
                    <div class="flex gap-3"><span class="text-red-400 mt-0.5">→</span> <span><strong>Zlé počasie:</strong> Chráň všetku elektroniku. Ideálne zostaň vnútri.</span></div>
                    <div class="flex gap-3"><span class="text-red-400 mt-0.5">→</span> <span>Ak musíš točiť: Použi dažďový kryt + extra batérie.</span></div>
                    <div class="flex gap-3"><span class="text-red-400 mt-0.5">→</span> <span>Zváž presunutie natáčania exteriérov na iný deň.</span></div>
                `;
            }
            html += `</div>`;

            // Prepíšeme dočasný loading text reálnym obsahom
            content.innerHTML = html;
        }

        function hideTipsModal() {
            const modal = document.getElementById('tipsModal');
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }

async function fetchWeather(lat, lon, cityName) {
            currentLat = lat; currentLon = lon;
            currentCity = cityName || "Tvoja poloha";
            document.getElementById('locationName').innerText = currentCity;
            
            try {
                // 1. ZÍSKAVAME SÚČASNÝ STAV ZO STANICE (OWM)
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=5405cbe3a37f0d34116a9ff45d7b1e58&units=metric&lang=sk`);
                const data = await res.json();
                currentOwmData = data;
                
                document.getElementById('temp').innerText = Math.round(data.main.temp) + "°C";
                document.getElementById('wind').innerText = Math.round(data.wind.speed * 3.6) + " km/h";
                document.getElementById('rain').innerText = data.weather[0].id < 700 ? "Áno" : "Nie";

                const code = data.weather[0].id;
                const wind = data.wind.speed * 3.6;
                if (code < 600 || wind > 35) setStatus("status-bad", "❌", "Zmotaj káble!", "Búrka / Dážď", "bad");
                else if (wind > 20 || code < 800) setStatus("status-warn", "⚠️", "Dávaj pozor!", "Vietor / Hmla", "warn");
                else setStatus("status-good", "✅", "Nekukaj a toč!", "Ideálne podmienky", "good");

                // 2. ZÍSKAVAME 16-DŇOVÚ PREDPOVEĎ (Open-Meteo) PRE KALENDÁR
                const resOm = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,sunrise,sunset&hourly=temperature_2m,windspeed_10m,cloudcover,weathercode&forecast_days=16&timezone=auto`);
                forecast16Data = await resOm.json();

            } catch (e) { 
                setStatus("status-bad", "⚠️", "Chyba", "Stanica nedostupná", "bad"); 
            }
        }

        // --- PREKLADAČ KÓDOV PRE KALENDÁR ---
        function getOmIcon(code) {
            if (code === 0) return '☀️';
            if (code === 1 || code === 2) return '🌤️';
            if (code === 3) return '☁️';
            if (code === 45 || code === 48) return '🌫️';
            if (code >= 51 && code <= 67) return '🌧️';
            if (code >= 71 && code <= 77) return '🌨️';
            if (code >= 80 && code <= 82) return '🌧️';
            if (code >= 85 && code <= 86) return '🌨️';
            if (code >= 95) return '⛈️';
            return '☁️';
        }
        
        function getOmDesc(code) {
            if (code === 0) return 'Jasno';
            if (code === 1 || code === 2) return 'Polooblačno';
            if (code === 3) return 'Zamračené';
            if (code === 45 || code === 48) return 'Hmla';
            if (code >= 51 && code <= 67 || code >= 80 && code <= 82) return 'Dážď';
            if (code >= 71 && code <= 77 || code >= 85 && code <= 86) return 'Sneh';
            if (code >= 95) return 'Búrka';
            return 'Neznáme';
        }

        // --- FUNKCIE PRE NOVÉ OKNÁ (Vtip, Kalendár, Detail dňa) ---
        function tellJoke() {
            const randomJoke = skVtipy[Math.floor(Math.random() * skVtipy.length)];
            document.getElementById('jokeContent').innerText = randomJoke;
            document.getElementById('jokeModal').classList.replace('hidden', 'flex');
        }

        function openCalendar() {
            if (!forecast16Data) return alert("Počkaj chvíľu, kalendár sa ešte sťahuje...");
            
            // Doplníme názov mesta do hlavičky kalendára
            document.getElementById('calendarTitle').innerText = `16 dní: ${currentCity}`;
            
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            
            const daysSk = ['Ne', 'Po', 'Ut', 'St', 'Št', 'Pi', 'So'];

            for (let i = 0; i < 16; i++) {
                const dateObj = new Date(forecast16Data.daily.time[i]);
                const dayName = daysSk[dateObj.getDay()];
                const dayNum = dateObj.getDate() + '.' + (dateObj.getMonth() + 1) + '.';
                const icon = getOmIcon(forecast16Data.daily.weathercode[i]);
                const tempMax = Math.round(forecast16Data.daily.temperature_2m_max[i]);

                const div = document.createElement('div');
                div.className = 'bg-zinc-800/50 hover:bg-zinc-700 border border-zinc-700/50 rounded-2xl p-3 flex flex-col items-center justify-center cursor-pointer transition-all';
                div.onclick = () => openDayDetail(i, dayName, dayNum);
                div.innerHTML = `
                    <div class="text-xs text-zinc-400 font-bold">${dayName}</div>
                    <div class="text-xs font-medium text-zinc-300 mb-2">${dayNum}</div>
                    <div class="text-3xl mb-1">${icon}</div>
                    <div class="text-sm font-bold text-white">${tempMax}°</div>
                `;
                grid.appendChild(div);
            }
            document.getElementById('calendarModal').classList.replace('hidden', 'flex');
        }

        function hideCalendar() { document.getElementById('calendarModal').classList.replace('flex', 'hidden'); }

        function openDayDetail(dayIndex, dayName, dayNum) {
            // Doplníme názov mesta do hlavičky detailu dňa
            document.getElementById('dayDetailTitle').innerText = `${currentCity} | ${dayName} ${dayNum}`;
            const content = document.getElementById('dayDetailContent');
            content.innerHTML = '';
            
            // Vytiahneme čas východu a západu slnka
            const sunrise = new Date(forecast16Data.daily.sunrise[dayIndex]).toLocaleTimeString('sk-SK', {hour: '2-digit', minute:'2-digit'});
            const sunset = new Date(forecast16Data.daily.sunset[dayIndex]).toLocaleTimeString('sk-SK', {hour: '2-digit', minute:'2-digit'});

            // Pridáme pásik so slnkom na vrch detailu
            content.innerHTML = `
                <div class="flex justify-between items-center bg-zinc-800/50 rounded-2xl p-3 mb-2 border border-zinc-700/50">
                    <div class="flex items-center gap-2"><span class="text-xl drop-shadow-md">🌅</span> <span class="text-sm font-bold text-emerald-400">${sunrise}</span></div>
                    <div class="flex items-center gap-2"><span class="text-sm font-bold text-amber-400">${sunset}</span> <span class="text-xl drop-shadow-md">🌇</span></div>
                </div>
            `;

            // 6-hodinové intervaly (Ráno 06:00, Obed 12:00, Večer 18:00, Noc 21:00)
            const hoursToDisplay = [6, 12, 18, 21];
            const labels = ["Ráno (06:00)", "Obed (12:00)", "Večer (18:00)", "Noc (21:00)"];

            hoursToDisplay.forEach((hour, idx) => {
                const absoluteIndex = (dayIndex * 24) + hour;
                const temp = Math.round(forecast16Data.hourly.temperature_2m[absoluteIndex]);
                const wind = Math.round(forecast16Data.hourly.windspeed_10m[absoluteIndex]);
                const cloud = forecast16Data.hourly.cloudcover[absoluteIndex];
                const code = forecast16Data.hourly.weathercode[absoluteIndex];
                
                content.innerHTML += `
                    <div class="bg-zinc-800/80 border border-zinc-700 rounded-2xl p-4 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="text-4xl w-10 text-center drop-shadow-lg">${getOmIcon(code)}</div>
                            <div>
                                <div class="text-sm text-zinc-400 font-bold mb-1">${labels[idx]}</div>
                                <div class="text-xl font-black text-white">${temp}°C</div>
                            </div>
                        </div>
                        <div class="text-right text-xs text-zinc-400 space-y-1">
                            <div class="font-bold text-emerald-400 bg-emerald-900/20 px-2 py-1 rounded-md inline-block mb-1">${getOmDesc(code)}</div>
                            <div>Vietor: <strong class="text-zinc-200">${wind} km/h</strong></div>
                            <div>Oblaky: <strong class="text-zinc-200">${cloud}%</strong></div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('dayDetailModal').classList.replace('hidden', 'flex');
        }

        function hideDayDetail() { document.getElementById('dayDetailModal').classList.replace('flex', 'hidden'); }

        function searchCity() {
            const input = document.getElementById('cityInput').value.trim();
            if (!input) return;

            fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(input)}&count=1&language=sk`)
                .then(r => r.json())
                .then(d => {
                    if (d.results && d.results[0]) {
                        fetchWeather(d.results[0].latitude, d.results[0].longitude, d.results[0].name);
                    } else {
                        alert("Mesto nenájdené");
                    }
                });
        }

        function useMyLocation() {
            if (!navigator.geolocation) return alert("Geolokácia nie je podporovaná");
            navigator.geolocation.getCurrentPosition(p => {
                fetchWeather(p.coords.latitude, p.coords.longitude, "Moja poloha");
            });
        }

        function openMap() {
    var city = document.getElementById('locationName').innerText;
    // Použijeme klasické spájanie reťazcov, kde nemôže vzniknúť SyntaxError
    var url = 'https://www.google.com/maps/search/' + encodeURIComponent(city);
    window.open(url, '_blank');
}

        // Autocomplete
        let debounceTimer = null;
        const cityInput = document.getElementById('cityInput');
        const suggestionsBox = document.getElementById('suggestions');

        cityInput.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(async () => {
                const query = cityInput.value.trim();
                if (query.length < 2) {
                    suggestionsBox.classList.add('hidden');
                    return;
                }

                try {
                    // Stiahneme viac výsledkov (15), aby sme ich mohli dobre vyfiltrovať a zoradiť
                    const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=15&language=sk`);
                    const data = await res.json();

                    suggestionsBox.innerHTML = '';
                    if (!data.results || data.results.length === 0) {
                        suggestionsBox.classList.add('hidden');
                        return;
                    }

                    // Vypočítame vzdialenosť pre každý výsledok a zoradíme ich od najbližšieho
                    const zoradeneVysledky = data.results.map(city => {
                        city.distance = calculateDistance(currentLat, currentLon, city.latitude, city.longitude);
                        return city;
                    }).sort((a, b) => a.distance - b.distance).slice(0, 5); // Zoberieme 5 najbližších

                    zoradeneVysledky.forEach(city => {
                        const div = document.createElement('div');
                        // Pridali sme items-center, aby boli texty a badge pekne v rovine
                        div.className = 'px-5 py-3 hover:bg-zinc-800 cursor-pointer flex justify-between items-center text-sm border-b border-zinc-800 last:border-none';
                        
                        div.innerHTML = `
                            <div>
                                <div class="font-medium text-white">${city.name}</div>
                                <div class="text-zinc-500 text-xs">${city.admin1 || ''} ${city.country || ''}</div>
                            </div>
                            <div class="text-emerald-500 text-xs bg-emerald-500/10 px-2 py-1 rounded-full whitespace-nowrap ml-3">
                                ${city.distance.toFixed(1)} km
                            </div>
                        `;
                        div.onclick = () => {
                            cityInput.value = city.name;
                            suggestionsBox.classList.add('hidden');
                            fetchWeather(city.latitude, city.longitude, city.name);
                        };
                        suggestionsBox.appendChild(div);
                    });

                    suggestionsBox.classList.remove('hidden');
                } catch (e) {
                    suggestionsBox.classList.add('hidden');
                }
            }, 280);
        });

        // Hide suggestions when clicking outside
        document.addEventListener('click', (e) => {
            if (!suggestionsBox.contains(e.target) && e.target !== cityInput) {
                suggestionsBox.classList.add('hidden');
            }
        });

        document.getElementById('cityInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                suggestionsBox.classList.add('hidden');
                searchCity();
            }
        });

        // Initial load
        fetchWeather(48.1486, 17.1077, "Bratislava");
    </script>
</body>
</html>
